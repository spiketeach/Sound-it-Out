<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sound It Out - Phonics Writing Tool</title>
    <!-- Use standard CDN links for better local compatibility -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Fredoka', sans-serif; background-color: #fff7ed; }
        .tap-active:active { transform: scale(0.9); }
        [box-sizing="border-box"] { box-sizing: border-box; }
    </style>
</head>
<body class="select-none">
    <div id="root">
        <div class="flex items-center justify-center min-h-screen">
            <p class="text-orange-400 font-bold animate-pulse text-xl">Loading your writing tool...</p>
        </div>
    </div>

    <script type="text/babel">
        // Manual Lucide Icon replacements for high compatibility
        const MicIcon = () => (
            <svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" x2="12" y1="19" y2="22"/></svg>
        );
        const PlayIcon = () => (
            <svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="5 3 19 12 5 21 5 3"/></svg>
        );
        const PencilIcon = () => (
            <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M17 3a2.85 2.83 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5Z"/><path d="m15 5 4 4"/></svg>
        );
        const EarIcon = () => (
            <svg xmlns="http://www.w3.org/2000/svg" width="54" height="54" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M6 8.5a6.5 6.5 0 1 1 13 0c0 6-6 6-6 10a3 3 0 1 1-6 0"/><path d="M15 8.5a2.5 2.5 0 0 0-5 0v1a2 2 0 1 1 0 4"/></svg>
        );
        const CheckIcon = () => (
            <svg xmlns="http://www.w3.org/2000/svg" width="80" height="80" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="4" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
        );
        const VolumeIcon = () => (
            <svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/></svg>
        );

        const { useState, useEffect, useRef } = React;

        const App = () => {
            const [isRecording, setIsRecording] = useState(false);
            const [transcript, setTranscript] = useState("");
            const [words, setWords] = useState([]);
            const [isAnalyzed, setIsAnalyzed] = useState(false);
            const [statusMessage, setStatusMessage] = useState("Tap the red button and speak!");
            const [availableVoices, setAvailableVoices] = useState([]);
            const [showSecretTranscript, setShowSecretTranscript] = useState(false);

            const recognition = useRef(null);

            useEffect(() => {
                const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
                if (SpeechRecognition) {
                    recognition.current = new SpeechRecognition();
                    recognition.current.continuous = false;
                    recognition.current.lang = 'en-GB';
                    
                    recognition.current.onresult = (event) => {
                        const result = event.results[0][0].transcript;
                        setTranscript(result);
                        setStatusMessage("Brilliant! I heard you.");
                        setIsRecording(false);
                    };

                    recognition.current.onerror = () => {
                        setStatusMessage("I didn't quite catch that. Try again?");
                        setIsRecording(false);
                    };

                    recognition.current.onend = () => setIsRecording(false);
                }

                const loadVoices = () => {
                    const allVoices = window.speechSynthesis.getVoices();
                    setAvailableVoices(allVoices);
                };

                window.speechSynthesis.onvoiceschanged = loadVoices;
                loadVoices();
            }, []);

            const getBestBritishVoice = () => {
                return (
                    availableVoices.find(v => v.name.includes('Google UK English Female')) ||
                    availableVoices.find(v => v.name.includes('Google UK English Male')) ||
                    availableVoices.find(v => v.name.includes('Microsoft Hazel')) ||
                    availableVoices.find(v => v.name.includes('Serena')) ||
                    availableVoices.find(v => v.lang.startsWith('en-GB')) ||
                    availableVoices.find(v => v.lang.startsWith('en'))
                );
            };

            const speak = (text, type = 'sentence') => {
                window.speechSynthesis.cancel();
                const utterance = new SpeechSynthesisUtterance(text);
                const voice = getBestBritishVoice();
                
                if (voice) {
                    utterance.voice = voice;
                    utterance.lang = 'en-GB';
                }

                if (type === 'word') {
                    // SLOWED TO 0.4 for better phonetic listening
                    utterance.rate = 0.4; 
                    utterance.pitch = 1.15; 
                } else {
                    utterance.rate = 0.85; 
                }
                window.speechSynthesis.speak(utterance);
            };

            const toggleRecording = () => {
                if (!recognition.current) {
                    alert("Speech recognition is not available in this browser. Please use Chrome or Edge.");
                    return;
                }
                if (isRecording) {
                    recognition.current.stop();
                } else {
                    setTranscript("");
                    setIsAnalyzed(false);
                    setShowSecretTranscript(false);
                    recognition.current.start();
                    setIsRecording(true);
                    setStatusMessage("Listening to you...");
                }
            };

            const analyzeSentence = () => {
                if (!transcript) return;
                const cleanWords = transcript.replace(/[.,/#!$%^&*;:{}=\-_`~()]/g, "").split(/\s+/).filter(w => w.length > 0);
                setWords(cleanWords);
                setIsAnalyzed(true);
                setStatusMessage("Ready! Tap each ear to hear the sounds.");
            };

            const resetApp = () => {
                setTranscript("");
                setWords([]);
                setIsAnalyzed(false);
                setShowSecretTranscript(false);
                setStatusMessage("Ready for a new sentence!");
            };

            return (
                <div className="min-h-screen flex flex-col items-center p-6">
                    <div className="w-full max-w-3xl text-center mt-4">
                        <h1 className="text-4xl font-black text-orange-600 mb-6 flex items-center justify-center gap-3 uppercase">
                            <VolumeIcon /> SOUND IT OUT
                        </h1>
                        
                        <div className="bg-white rounded-3xl p-6 shadow-xl border-4 border-orange-200 min-h-[100px] flex items-center justify-center relative overflow-hidden">
                            <div className="absolute top-0 left-0 w-2 h-full bg-orange-400"></div>
                            <p className="text-2xl font-bold text-slate-500">
                                {isRecording ? "Listening..." : isAnalyzed ? "Writing Time!" : statusMessage}
                            </p>
                        </div>
                    </div>

                    <div className="flex gap-10 my-10">
                        <div className="flex flex-col items-center gap-3">
                            <button
                                onClick={toggleRecording}
                                className={`w-32 h-32 rounded-full flex items-center justify-center shadow-2xl transition-all border-8 border-white tap-active ${isRecording ? 'bg-red-500 animate-pulse' : 'bg-red-400'}`}
                            >
                                <div className="text-white"><MicIcon /></div>
                            </button>
                            <span className="font-black text-red-600 text-xl uppercase tracking-wider">Speak</span>
                        </div>

                        <div className="flex flex-col items-center gap-3">
                            <button
                                onClick={() => speak(transcript)}
                                disabled={!transcript || isRecording}
                                className="w-32 h-32 rounded-full bg-blue-400 text-white flex items-center justify-center shadow-2xl transition-all border-8 border-white disabled:opacity-30 tap-active"
                            >
                                <PlayIcon />
                            </button>
                            <span className="font-black text-blue-600 text-xl uppercase tracking-wider">Hear All</span>
                        </div>
                    </div>

                    {!isAnalyzed && transcript && !isRecording && (
                        <button
                            onClick={analyzeSentence}
                            className="flex items-center gap-4 px-14 py-6 bg-amber-400 text-white rounded-2xl text-4xl font-black shadow-2xl transition-all animate-bounce mb-8 tap-active"
                        >
                            <PencilIcon /> WRITE
                        </button>
                    )}

                    {isAnalyzed && (
                        <div className="w-full max-w-5xl bg-white rounded-[3rem] p-10 shadow-2xl border-4 border-purple-100 mb-12">
                            <div className="flex flex-wrap justify-center gap-8 items-end">
                                {words.map((word, index) => (
                                    <div key={index} className="flex flex-col items-center gap-4">
                                        <button
                                            onClick={() => speak(word, 'word')}
                                            className="w-24 h-24 rounded-3xl bg-purple-500 text-white flex items-center justify-center shadow-lg border-4 border-purple-200 tap-active"
                                        >
                                            <EarIcon />
                                        </button>
                                        <div className="h-1.5 w-full bg-slate-100 rounded-full"></div>
                                    </div>
                                ))}
                                <div className="flex flex-col items-center gap-4">
                                    <div className="w-24 h-24 rounded-full bg-slate-800 text-white flex items-center justify-center text-6xl font-black border-4 border-slate-400">.</div>
                                    <div className="h-1.5 w-full bg-slate-100 rounded-full"></div>
                                </div>
                            </div>
                            <p className="text-center mt-12 text-purple-400 font-black text-xl tracking-widest uppercase">
                                Tap the ears to hear each word
                            </p>
                        </div>
                    )}

                    <div className="mt-auto mb-4 flex flex-col items-center gap-3">
                        <button
                            onClick={resetApp}
                            className="w-32 h-32 rounded-full bg-emerald-500 text-white shadow-2xl border-8 border-white flex items-center justify-center tap-active"
                        >
                            <CheckIcon />
                        </button>
                        <span className="font-black text-emerald-600 text-2xl uppercase tracking-tighter">Finished</span>
                    </div>

                    {transcript && (
                        <div className="mt-4 opacity-20 hover:opacity-100 flex flex-col items-center">
                            <button 
                                onClick={() => setShowSecretTranscript(!showSecretTranscript)}
                                className="text-[10px] text-slate-400"
                            >
                                {showSecretTranscript ? "Hide Teacher View" : "Show Teacher View"}
                            </button>
                            {showSecretTranscript && <p className="text-xs text-slate-500 mt-1 italic">"{transcript}"</p>}
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
