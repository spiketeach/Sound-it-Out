<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sound It Out</title>

  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>

  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&display=swap" rel="stylesheet">

  <style>
    body { font-family: 'Fredoka', sans-serif; background-color: #fff7ed; }
    .tap-active:active { transform: scale(0.92); }
  </style>
</head>

<body class="select-none">
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useRef } = React;

/* ✅ iOS DETECTION */
const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent);

/* ICONS (unchanged) */
const MicIcon = () => (
  <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
    <path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"/>
    <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
  </svg>
);

const EarIcon = () => (
  <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
    <path d="M6 8.5a6.5 6.5 0 1 1 13 0c0 6-6 6-6 10a3 3 0 1 1-6 0"/>
  </svg>
);

const App = () => {
  const [transcript, setTranscript] = useState("");
  const [isRecording, setIsRecording] = useState(false);
  const [words, setWords] = useState([]);
  const inputRef = useRef(null);
  const recognition = useRef(null);

  /* ✅ SET UP SPEECH RECOGNITION ONLY IF NOT iOS */
  useEffect(() => {
    if (isIOS) return;

    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SR) return;

    recognition.current = new SR();
    recognition.current.lang = "en-GB";
    recognition.current.onresult = e => {
      setTranscript(e.results[0][0].transcript);
      setIsRecording(false);
    };
    recognition.current.onend = () => setIsRecording(false);
  }, []);

  const handleMicPress = () => {
    if (isIOS) {
      // ✅ iPad path: show keyboard + dictation
      inputRef.current.focus();
      inputRef.current.scrollIntoView({ behavior: "smooth", block: "center" });
      return;
    }

    // ✅ Laptop path
    setTranscript("");
    setIsRecording(true);
    recognition.current.start();
  };

  const analyse = () => {
    const clean = transcript.replace(/[.,!?]/g, "")
      .split(" ")
      .filter(Boolean);
    setWords(clean);
  };

  const speakWord = word => {
    const u = new SpeechSynthesisUtterance(word);
    u.rate = 0.4;
    u.lang = "en-GB";
    speechSynthesis.speak(u);
  };

  return (
    <div className="min-h-screen flex flex-col items-center p-6">
      <h1 className="text-4xl font-black text-orange-600 mb-6">SOUND IT OUT</h1>

      <div className="bg-white p-6 rounded-3xl shadow-xl max-w-xl w-full text-center">
        {isIOS ? (
          <p className="text-xl font-bold text-orange-500">
            Tap the red button, then tap the microphone on the keyboard
          </p>
        ) : (
          <p className="text-xl font-bold text-orange-500">
            Tap the red button and speak
          </p>
        )}
      </div>

      {/* ✅ DICTATION INPUT (iOS only) */}
      {isIOS && (
        <input
          ref={inputRef}
          type="text"
          value={transcript}
          onChange={e => setTranscript(e.target.value)}
          placeholder="Tap the mic on the keyboard and speak…"
          className="mt-6 w-full max-w-xl text-2xl p-4 rounded-xl border-4 border-orange-200"
        />
      )}

      <button
        onClick={handleMicPress}
        className="mt-10 w-32 h-32 rounded-full bg-red-500 text-white flex items-center justify-center shadow-2xl tap-active"
      >
        <MicIcon />
      </button>

      {transcript && (
        <button
          onClick={analyse}
          className="mt-8 px-12 py-5 bg-amber-400 text-white rounded-2xl text-3xl font-black shadow-xl tap-active"
        >
          WRITE
        </button>
      )}

      {words.length > 0 && (
        <div className="flex flex-wrap justify-center gap-6 mt-10">
          {words.map((w, i) => (
            <button
              key={i}
              onClick={() => speakWord(w)}
              className="w-24 h-24 bg-purple-500 text-white rounded-3xl flex items-center justify-center shadow-xl tap-active"
            >
              <EarIcon />
            </button>
          ))}
        </div>
      )}
    </div>
  );
};

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
