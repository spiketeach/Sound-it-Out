<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Sound It Out</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@700;800;900&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }

        body {
            font-family: 'Nunito', sans-serif;
            background-color: #fff7ed;
            background-image:
                radial-gradient(circle at 20% 20%, #ffe4c4 0%, transparent 50%),
                radial-gradient(circle at 80% 80%, #ffd6e7 0%, transparent 50%);
            min-height: 100vh;
            user-select: none;
            -webkit-user-select: none;
        }

        /* ── Keyframes ── */
        @keyframes pulseRing {
            0%   { transform: scale(1);    opacity: 0.7; }
            100% { transform: scale(1.65); opacity: 0;   }
        }
        @keyframes bounceIn {
            0%   { transform: scale(0.5);  opacity: 0; }
            70%  { transform: scale(1.08); opacity: 1; }
            100% { transform: scale(1);    opacity: 1; }
        }
        @keyframes cardPop {
            0%   { transform: translateY(20px) scale(0.8); opacity: 0; }
            100% { transform: translateY(0)    scale(1);   opacity: 1; }
        }
        @keyframes earWiggle {
            0%,100% { transform: rotate(0deg)   scale(1);   }
            25%     { transform: rotate(-15deg) scale(1.1); }
            75%     { transform: rotate(15deg)  scale(1.1); }
        }
        @keyframes breathe {
            0%,100% { transform: scale(1);    }
            50%     { transform: scale(1.04); }
        }
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(12px); }
            to   { opacity: 1; transform: translateY(0);    }
        }

        /* ── Reusable animation classes ── */
        .bounce-in { animation: bounceIn 0.4s cubic-bezier(0.34,1.56,0.64,1) both; }
        .card-pop  { animation: cardPop  0.35s cubic-bezier(0.34,1.56,0.64,1) both; }
        .breathe   { animation: breathe  2.5s ease-in-out infinite; }
        .fade-up   { animation: fadeUp   0.3s ease both; }
        .ear-wiggle { animation: earWiggle 0.5s ease; }

        /* ── Recording rings ── */
        .recording-ring { position:absolute; inset:0; border-radius:50%; pointer-events:none; }
        .recording-ring::before,
        .recording-ring::after {
            content:''; position:absolute; inset:-8px; border-radius:50%;
            border:4px solid #ef4444;
            animation: pulseRing 1.4s ease-out infinite;
        }
        .recording-ring::after { animation-delay:0.7s; }

        /* ── Layout ── */
        .page {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 24px 16px 52px;
        }
        .title {
            font-family: 'Fredoka One', cursive;
            font-size: clamp(2rem, 6vw, 3rem);
            color: #ea580c;
            text-shadow: 2px 3px 0 rgba(234,88,12,0.18);
            text-align: center;
            margin-bottom: 20px;
        }

        /* Status box */
        .status-box {
            width: 100%; max-width: 440px;
            background: white;
            border: 4px solid #fed7aa;
            border-radius: 28px;
            padding: 16px 24px;
            text-align: center;
            box-shadow: 0 4px 20px rgba(234,88,12,0.12);
            margin-bottom: 24px;
        }
        .status-text {
            font-weight: 900;
            font-size: 1.2rem;
            color: #ea580c;
            line-height: 1.35;
        }

        /* Button row */
        .btn-row {
            display: flex;
            gap: 40px;
            align-items: flex-end;
            justify-content: center;
            margin-bottom: 24px;
        }
        .btn-col {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }
        .btn-label {
            font-weight: 900;
            font-size: 1.05rem;
            letter-spacing: 0.07em;
            text-transform: uppercase;
        }

        /* Circle buttons */
        .circle-btn {
            width: 120px; height: 120px;
            border-radius: 50%;
            color: white;
            border: 6px solid white;
            display: flex; align-items: center; justify-content: center;
            position: relative;
            cursor: pointer;
            transition: transform 0.12s, opacity 0.15s;
            padding: 0;
        }
        .circle-btn:active  { transform: scale(0.87); }
        .circle-btn:disabled { opacity: 0.28; cursor: default; }
        .circle-btn:disabled:active { transform: none; }

        /* Write button */
        .write-btn {
            display: flex; align-items: center; gap: 12px;
            padding: 16px 44px;
            border-radius: 20px;
            font-size: 1.9rem;
            font-weight: 900;
            font-family: 'Nunito', sans-serif;
            color: white;
            background: linear-gradient(135deg, #f59e0b, #f97316);
            border: 4px solid rgba(255,255,255,0.4);
            box-shadow: 0 8px 24px rgba(245,158,11,0.45);
            letter-spacing: 0.05em;
            cursor: pointer;
            transition: transform 0.12s;
            margin-bottom: 28px;
        }
        .write-btn:active { transform: scale(0.87); }

        /* Word cards panel */
        .words-panel {
            width: 100%; max-width: 640px;
            background: white;
            border: 4px solid #e9d5ff;
            border-radius: 32px;
            padding: 32px 24px;
            box-shadow: 0 8px 40px rgba(124,58,237,0.15);
            margin-bottom: 28px;
        }
        .words-grid {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 24px;
            align-items: flex-end;
        }
        .word-col {
            display: flex; flex-direction: column;
            align-items: center; gap: 10px;
        }
        .ear-btn {
            width: 96px; height: 96px;
            border-radius: 26px;
            background: linear-gradient(145deg, #a855f7, #7c3aed);
            color: white;
            border: 4px solid rgba(255,255,255,0.4);
            box-shadow: 0 6px 24px rgba(124,58,237,0.4);
            display: flex; align-items: center; justify-content: center;
            cursor: pointer;
            transition: transform 0.12s;
            padding: 0;
        }
        .ear-btn:active { transform: scale(0.87); }
        .word-line { height:6px; width:86px; background:#e2e8f0; border-radius:99px; }
        .fullstop-tile {
            width:96px; height:96px; border-radius:26px;
            background: linear-gradient(145deg, #475569, #1e293b);
            color:white; font-size:3.5rem; font-weight:900;
            border:4px solid rgba(255,255,255,0.25);
            box-shadow:0 6px 20px rgba(30,41,59,0.3);
            display:flex; align-items:center; justify-content:center;
        }
        .words-hint {
            text-align:center; margin-top:24px;
            font-weight:900; font-size:0.95rem;
            letter-spacing:0.12em; text-transform:uppercase;
            color:#a78bfa;
        }

        /* Finished */
        .finished-col {
            display:flex; flex-direction:column; align-items:center; gap:8px;
            margin-top:12px;
        }
        .finished-label {
            font-weight:900; font-size:1.2rem;
            letter-spacing:0.07em; text-transform:uppercase;
            color:#059669;
        }

        /* Teacher view */
        .teacher-wrap {
            margin-top:28px;
            display:flex; flex-direction:column; align-items:center;
            opacity:0.18; transition:opacity 0.2s;
        }
        .teacher-wrap:hover { opacity:1; }
        .teacher-btn { font-size:0.62rem; color:#94a3b8; background:none; border:none; cursor:pointer; }
        .teacher-text { font-size:0.75rem; color:#64748b; font-style:italic; margin-top:4px; }

        /* ── iOS panel ── */
        .ios-panel {
            width:100%; max-width:400px;
            display:flex; flex-direction:column; align-items:center;
            gap:18px; margin-top:4px;
        }
        .ios-instruction {
            background:white;
            border:4px solid #fb923c;
            border-radius:28px;
            padding:20px 28px;
            text-align:center;
            box-shadow:0 6px 24px rgba(234,88,12,0.14);
            width:100%;
            display:flex; flex-direction:column; align-items:center; gap:12px;
        }
        .ios-instruction-text {
            font-weight:900; font-size:1.3rem; line-height:1.35; color:#c2410c;
        }
        .mic-keyboard-hint {
            background:#1c1c1e; border-radius:14px;
            padding:14px 18px 16px; display:inline-block;
        }
        .key-row { display:flex; gap:5px; justify-content:center; margin-bottom:5px; }
        .mic-key {
            background:#3a3a3c; border-radius:6px;
            color:white; font-size:13px; font-weight:700;
            padding:7px 10px; min-width:28px; text-align:center;
        }
        .mic-key.highlight {
            background:#ff6b35; transform:scale(1.15);
            box-shadow:0 0 12px rgba(255,107,53,0.7);
        }
        .key-hint-label { color:#888; font-size:10px; text-align:center; margin-top:6px; }
        .ios-textarea {
            width:100%; min-height:100px;
            font-size:1.35rem; font-weight:900;
            font-family:'Nunito', sans-serif;
            padding:14px 16px;
            border-radius:20px;
            border:4px solid #fb923c;
            background:white; resize:none;
            box-shadow:0 4px 16px rgba(234,88,12,0.15);
            color:#334155; line-height:1.4;
        }
        .ios-textarea:focus { outline:none; border-color:#ea580c; }
        .ios-textarea::placeholder { color:#cbd5e1; font-weight:700; }
        .ios-hear-row { display:flex; gap:20px; margin-bottom:8px; }
    </style>
</head>
<body>
<div id="root">
    <div style="display:flex;align-items:center;justify-content:center;min-height:100vh">
        <p style="color:#ea580c;font-weight:900;font-size:1.3rem;font-family:sans-serif">Loading…</p>
    </div>
</div>

<script type="text/babel">
const { useState, useEffect, useRef } = React;

/* ── Device detection ── */
const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) ||
              (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);

/* ── SVG Icons ── */
const MicSVG = ({size=56}) => (
    <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round">
        <path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"/>
        <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
        <line x1="12" x2="12" y1="19" y2="22"/>
    </svg>
);
const PlaySVG = ({size=48}) => (
    <svg width={size} height={size} viewBox="0 0 24 24" fill="currentColor" stroke="none">
        <polygon points="5 3 19 12 5 21 5 3"/>
    </svg>
);
const EarSVG = ({size=46}) => (
    <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round">
        <path d="M6 8.5a6.5 6.5 0 1 1 13 0c0 6-6 6-6 10a3 3 0 1 1-6 0"/>
        <path d="M15 8.5a2.5 2.5 0 0 0-5 0v1a2 2 0 1 1 0 4"/>
    </svg>
);
const CheckSVG = ({size=56}) => (
    <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3.5" strokeLinecap="round" strokeLinejoin="round">
        <polyline points="20 6 9 17 4 12"/>
    </svg>
);
const PencilSVG = ({size=36}) => (
    <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round">
        <path d="M17 3a2.85 2.83 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5Z"/>
        <path d="m15 5 4 4"/>
    </svg>
);
const KeyboardMicSVG = () => (
    <svg width="44" height="44" viewBox="0 0 24 24" fill="none" stroke="#ea580c" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
        <rect x="2" y="14" width="20" height="8" rx="2"/>
        <path d="M12 2a3 3 0 0 0-3 3v4a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"/>
        <path d="M17 9v1a5 5 0 0 1-10 0V9"/>
    </svg>
);

/* ── Voice ──
   iOS loads voices asynchronously; we keep a live ref updated by
   onvoiceschanged so we always pick from the real list.
   Priority order targets female English voices on every platform:
   - iOS/iPadOS:  Samantha (en-US female), Karen (en-AU female),
                  Moira (en-IE female), Daniel is male so excluded
   - Chrome/Edge: Google UK English Female
   - Windows:     Microsoft Hazel / Susan / Zira
   - Fallback:    any en-GB, then any English voice              */
const voicesRef = { current: [] };
const loadVoices = () => {
    const v = window.speechSynthesis.getVoices();
    if (v.length) voicesRef.current = v;
};
window.speechSynthesis.onvoiceschanged = loadVoices;
loadVoices();

const FEMALE_NAMES = [
    'Google UK English Female',
    'Microsoft Hazel',
    'Microsoft Susan',
    'Microsoft Zira',
    'Serena',
    'Samantha',   // iOS en-US female
    'Karen',      // iOS en-AU female
    'Moira',      // iOS en-IE female
    'Tessa',      // iOS en-ZA female
];

const getBestVoice = () => {
    // Re-read in case they loaded since last call
    const voices = window.speechSynthesis.getVoices();
    if (voices.length) voicesRef.current = voices;
    const all = voicesRef.current;

    // 1. Named female voices (in priority order)
    for (const name of FEMALE_NAMES) {
        const match = all.find(v => v.name.includes(name));
        if (match) return match;
    }
    // 2. Any en-GB voice that isn't explicitly male-named
    const enGB = all.find(v => v.lang === 'en-GB' &&
        !v.name.includes('Daniel') && !v.name.includes('Male'));
    if (enGB) return enGB;
    // 3. Any English voice
    return all.find(v => v.lang.startsWith('en')) || null;
};

const speak = (text, type = 'sentence') => {
    window.speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(text);
    u.lang = 'en-GB';
    const voice = getBestVoice();
    if (voice) u.voice = voice;
    if (type === 'word') { u.rate = 0.4; u.pitch = 1.2; }
    else { u.rate = 0.85; u.pitch = 1.1; }
    window.speechSynthesis.speak(u);
};

/* ── Word Card ── */
const WordCard = ({ word, index }) => {
    const [wiggling, setWiggling] = useState(false);
    const tap = () => {
        speak(word, 'word');
        setWiggling(true);
        setTimeout(() => setWiggling(false), 550);
    };
    return (
        <div className="word-col card-pop" style={{animationDelay:`${index * 0.07}s`}}>
            <button className="ear-btn" onClick={tap} aria-label={`Hear word ${word}`}>
                <span className={wiggling ? 'ear-wiggle' : ''} style={{display:'flex'}}>
                    <EarSVG size={46}/>
                </span>
            </button>
            <div className="word-line"/>
        </div>
    );
};

/* ── iOS Panel ── */
const IOSPanel = ({ transcript, onChange, onAnalyse }) => (
    <div className="ios-panel fade-up">
        <div className="ios-instruction breathe">
            <KeyboardMicSVG/>
            <p className="ios-instruction-text">
                Tap below, then press<br/>
                <span style={{fontSize:'1.7rem'}}>🎤</span> on the keyboard!
            </p>
            <div className="mic-keyboard-hint">
                <div className="key-row">
                    {['Q','W','E','R','T','Y'].map(k => (
                        <div key={k} className="mic-key">{k}</div>
                    ))}
                </div>
                <div className="key-row">
                    <div className="mic-key" style={{flex:1,fontSize:'10px'}}>space</div>
                    <div className="mic-key highlight">🎤</div>
                    <div className="mic-key" style={{fontSize:'10px'}}>⏎</div>
                </div>
                <div className="key-hint-label">tap the orange mic!</div>
            </div>
        </div>

        <textarea
            className="ios-textarea"
            value={transcript}
            onChange={e => onChange(e.target.value)}
            placeholder="Your words will appear here…"
            inputMode="text"
            autoCorrect="on"
            spellCheck="false"
            autoComplete="off"
        />

        {transcript.trim().length > 0 && (
            <button className="write-btn bounce-in" onClick={onAnalyse}>
                <PencilSVG size={36}/> WRITE
            </button>
        )}
    </div>
);

/* ── Main App ── */
const App = () => {
    const [isRecording, setIsRecording] = useState(false);
    const [transcript,  setTranscript]  = useState('');
    const [words,       setWords]       = useState([]);
    const [isAnalyzed,  setIsAnalyzed]  = useState(false);
    const [iosInput,    setIosInput]    = useState(false);
    const [showTeacher, setShowTeacher] = useState(false);
    const [status, setStatus] = useState(
        isIOS ? 'Tap the red button to start!' : 'Tap the red button and speak!'
    );
    const recognitionRef = useRef(null);

    /* Voices are loaded at module level via voicesRef */

    /* Set up speech recognition — non-iOS only */
    useEffect(() => {
        if (isIOS) return;
        const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (!SR) return;
        const rec = new SR();
        rec.lang = 'en-GB';
        rec.continuous = false;
        rec.onresult = e => {
            setTranscript(e.results[0][0].transcript);
            setIsRecording(false);
            setStatus('Brilliant! I heard you! 🎉');
        };
        rec.onerror = () => {
            setIsRecording(false);
            setStatus("I didn't catch that. Try again!");
        };
        rec.onend = () => setIsRecording(false);
        recognitionRef.current = rec;
    }, []);

    const toggleRecording = () => {
        if (isIOS) {
            setTranscript('');
            setIsAnalyzed(false);
            setIosInput(true);
            setStatus('Use the keyboard mic to speak!');
            return;
        }
        if (!recognitionRef.current) {
            alert('Speech recognition needs Chrome or Edge.');
            return;
        }
        if (isRecording) {
            recognitionRef.current.stop();
        } else {
            setTranscript('');
            setIsAnalyzed(false);
            setShowTeacher(false);
            setIsRecording(true);
            setStatus('Listening…');
            recognitionRef.current.start();
        }
    };

    const analyseSentence = () => {
        const clean = transcript.replace(/[^\w\s']/g, '').split(/\s+/).filter(Boolean);
        setWords(clean);
        setIsAnalyzed(true);
        setIosInput(false);
        setStatus('Tap each ear to hear the sounds!');
    };

    const reset = () => {
        setTranscript('');
        setWords([]);
        setIsAnalyzed(false);
        setIosInput(false);
        setShowTeacher(false);
        setStatus(isIOS ? 'Tap the red button to start!' : 'Tap the red button and speak!');
    };

    return (
        <div className="page">

            <h1 className="title">🔊 SOUND IT OUT</h1>

            <div className="status-box">
                <p className="status-text">
                    {isRecording ? '🎙 Listening…' : status}
                </p>
            </div>

            {/* iOS dictation panel */}
            {iosInput && !isAnalyzed && (
                <IOSPanel
                    transcript={transcript}
                    onChange={setTranscript}
                    onAnalyse={analyseSentence}
                />
            )}

            {/* Main buttons */}
            {!iosInput && (
                <div className="btn-row">
                    <div className="btn-col">
                        <div style={{position:'relative',display:'flex',alignItems:'center',justifyContent:'center'}}>
                            {isRecording && <div className="recording-ring"/>}
                            <button
                                className="circle-btn"
                                onClick={toggleRecording}
                                style={{
                                    background: isRecording
                                        ? '#ef4444'
                                        : 'linear-gradient(145deg,#f87171,#ef4444)',
                                    boxShadow: '0 8px 32px rgba(239,68,68,0.5)',
                                    zIndex: 1,
                                }}
                                aria-label="Record"
                            >
                                <MicSVG size={56}/>
                            </button>
                        </div>
                        <span className="btn-label" style={{color:'#dc2626'}}>Speak</span>
                    </div>

                    <div className="btn-col">
                        <button
                            className="circle-btn"
                            onClick={() => speak(transcript)}
                            disabled={!transcript}
                            style={{
                                background:'linear-gradient(145deg,#60a5fa,#3b82f6)',
                                boxShadow:'0 8px 32px rgba(59,130,246,0.4)',
                            }}
                            aria-label="Hear all"
                        >
                            <PlaySVG size={52}/>
                        </button>
                        <span className="btn-label" style={{color:'#2563eb'}}>Hear All</span>
                    </div>
                </div>
            )}

            {/* WRITE — Chrome/Edge after recording */}
            {!isIOS && transcript && !isAnalyzed && !isRecording && (
                <button className="write-btn bounce-in" onClick={analyseSentence}>
                    <PencilSVG size={36}/> WRITE
                </button>
            )}

            {/* iOS: Hear All while text is in box */}
            {iosInput && transcript && (
                <div className="ios-hear-row">
                    <button
                        className="circle-btn"
                        onClick={() => speak(transcript)}
                        style={{
                            width:80, height:80,
                            background:'linear-gradient(145deg,#60a5fa,#3b82f6)',
                            boxShadow:'0 6px 20px rgba(59,130,246,0.4)',
                            border:'5px solid white',
                        }}
                    >
                        <PlaySVG size={36}/>
                    </button>
                </div>
            )}

            {/* Word cards */}
            {isAnalyzed && (
                <div className="words-panel bounce-in">
                    <div className="words-grid">
                        {words.map((w, i) => <WordCard key={i} word={w} index={i}/>)}
                        <div className="word-col card-pop" style={{animationDelay:`${words.length*0.07}s`}}>
                            <div className="fullstop-tile">.</div>
                            <div className="word-line"/>
                        </div>
                    </div>
                    <p className="words-hint">Tap the ears to hear each word</p>
                </div>
            )}

            {/* Finished */}
            <div className="finished-col">
                <button
                    className="circle-btn"
                    onClick={reset}
                    style={{
                        background:'linear-gradient(145deg,#34d399,#10b981)',
                        boxShadow:'0 8px 32px rgba(16,185,129,0.45)',
                    }}
                    aria-label="Finished"
                >
                    <CheckSVG size={56}/>
                </button>
                <span className="finished-label">Finished</span>
            </div>

            {/* Teacher view */}
            {transcript && (
                <div className="teacher-wrap">
                    <button className="teacher-btn" onClick={() => setShowTeacher(!showTeacher)}>
                        {showTeacher ? 'Hide Teacher View' : 'Show Teacher View'}
                    </button>
                    {showTeacher && <p className="teacher-text">"{transcript}"</p>}
                </div>
            )}

        </div>
    );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
